from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - long_hu_reason_type_name
  - long_hu_trader_name
  - long_hu_buy_amount
  - long_hu_sell_amount
  - long_hu_net_amount

time_range:
  field: trade_time
  start: "2025-01-01 00:00:00"
  end: "2025-01-31 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000001.SZ"

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
