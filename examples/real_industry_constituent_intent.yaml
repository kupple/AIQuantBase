from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - industry_constituent_index_code
  - industry_constituent_index_name
  - industry_level1_name

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "600602.SH"

time_range:
  field: trade_time
  start: "2016-06-01 00:00:00"
  end: "2016-06-30 23:59:59"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
