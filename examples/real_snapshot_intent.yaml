from: stock_snapshot_real

select:
  - code
  - trade_time
  - last
  - pre_close
  - open
  - high
  - low
  - close
  - volume
  - amount
  - num_trades
  - high_limited
  - low_limited
  - ask_price1
  - ask_volume1
  - bid_price1
  - bid_volume1
  - trading_phase_code
  - average_price

time_range:
  field: trade_time
  start: "2026-04-09 14:55:00"
  end: "2026-04-09 14:59:00"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000004.SZ"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
