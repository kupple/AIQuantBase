from: stock_minute_real

select:
  - code
  - trade_time
  - minute_open
  - minute_high
  - minute_low
  - minute_close
  - minute_volume
  - minute_amount

time_range:
  field: trade_time
  start: "2026-04-09 14:55:00"
  end: "2026-04-09 14:59:00"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000004.SZ"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
