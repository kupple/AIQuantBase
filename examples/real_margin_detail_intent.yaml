from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - margin_borrow_money_balance
  - margin_purch_with_borrow_money
  - margin_repayment_of_borrow_money
  - margin_net_borrow_money
  - margin_trade_balance

time_range:
  field: trade_time
  start: "2025-01-01 00:00:00"
  end: "2025-01-31 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000001.SZ"

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
