from: stock_daily_real

select:
  - stock_daily_real.code
  - stock_daily_real.trade_time
  - stock_daily_real.close
  - history_stock_status_real.preclose
  - history_stock_status_real.high_limited
  - history_stock_status_real.low_limited
  - history_stock_status_real.is_st_sec
  - history_stock_status_real.is_susp_sec

time_range:
  field: stock_daily_real.trade_time
  start: "2026-04-01 00:00:00"
  end: "2026-04-07 23:59:59"

where:
  mode: and
  items:
    - field: stock_daily_real.code
      op: "="
      value: "000004.SZ"
    - field: stock_daily_real.close
      op: is_not_null
      value: null

order_by:
  - field: stock_daily_real.trade_time
    direction: asc

page: 1
page_size: 5

safety:
  lookahead_safe: true
  strict_mode: true
