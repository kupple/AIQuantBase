from: industry_daily_real

select:
  - index_code
  - trade_date
  - industry_daily_open
  - industry_daily_high
  - industry_daily_low
  - industry_daily_close
  - industry_pb
  - industry_pe
  - industry_total_cap
  - industry_name

time_range:
  field: trade_date
  start: "2026-03-24"
  end: "2026-03-30"

where:
  mode: and
  items:
    - field: index_code
      op: "="
      value: "801010.SI"

order_by:
  - field: trade_date
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
