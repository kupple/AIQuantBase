from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - block_trade_date
  - block_trade_frequency
  - block_trade_avg_volume
  - block_trade_avg_amount_per_freq

time_range:
  field: trade_time
  start: "2010-01-01 00:00:00"
  end: "2010-02-28 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000009.SZ"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
