from: stock_daily_real

select:
  - code
  - trade_time
  - open
  - high
  - low
  - close
  - open_adj
  - high_adj
  - low_adj
  - close_adj
  - pre_close
  - gap_open_return
  - high_limited
  - low_limited
  - is_st
  - forward_adj_factor

time_range:
  field: trade_time
  start: "2026-04-01 00:00:00"
  end: "2026-04-07 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000004.SZ"
    - field: close
      op: is_not_null
      value: null

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 5

safety:
  lookahead_safe: true
  strict_mode: true
