from: stock_snapshot_real

select:
  - code
  - trade_time
  - snapshot_last
  - snapshot_bid_price1
  - snapshot_ask_price1
  - snapshot_bid_volume1
  - snapshot_ask_volume1
  - snapshot_num_trades
  - snapshot_trading_phase_code

time_range:
  field: trade_time
  start: "2026-04-09 14:55:00"
  end: "2026-04-09 14:59:00"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000004.SZ"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
