      - high_limited
      - low_limited
      - is_st_sec
      - is_susp_sec
      - is_wd_sec
      - is_xr_sec

  - name: equity_structure_real
    table: starlight.ad_equity_structure
    entity_keys: [market_code]
    time_key: change_date
    grain: daily
    fields:
      - tot_share
      - float_share
      - float_a_share

  - name: industry_weight_real
    table: starlight.ad_industry_weight
    entity_keys: [con_code]
    time_key: trade_date
    grain: daily
    fields:
