edges:
  - name: stock_daily_real_to_adj_factor_real
    from: stock_daily_real
    to: adj_factor_real
    relation_type: direct
    join_keys:
      - base: code
        source: code
    time_binding:
      mode: same_date
      base_time_field: trade_time
      base_time_cast: date
      source_time_field: trade_date

  - name: stock_daily_real_to_backward_factor_real
