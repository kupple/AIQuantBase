nodes:
  - name: stock_daily_real
    table: starlight.ad_market_kline_daily
    entity_keys: [code]
    time_key: trade_time
    grain: daily
    fields:
      - code
      - trade_time
      - open
      - high
      - low
      - close
      - volume
      - amount

  - name: stock_minute_real
    table: starlight.ad_market_kline_minute
    entity_keys: [code]
    time_key: trade_time
    grain: minute
    fields:
      - code
      - trade_time
      - open
      - high
      - low
      - close
      - volume
      - amount

  - name: adj_factor_real
    table: starlight.ad_adj_factor
    entity_keys: [code]
    time_key: trade_date
    grain: daily
    fields:
      - factor_value

  - name: backward_factor_real
    table: starlight.ad_backward_factor
    entity_keys: [code]
    time_key: trade_date
    grain: daily
    fields:
      - factor_value

  - name: history_stock_status_real
    table: starlight.ad_history_stock_status
    entity_keys: [market_code]
    time_key: trade_date
    grain: daily
    fields:
