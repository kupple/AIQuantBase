from: stock_daily_real

select:
  - code
  - trade_time
  - close

time_range:
  field: trade_time
  start: "2024-01-01"
  end: "2024-01-31"

where:
  mode: and
  items:
    - field: code
      op: in
      value:
        - "000001.SZ"
        - "000002.SZ"
        - "000004.SZ"

order_by:
  - field: trade_time
    direction: asc
  - field: code
    direction: asc

page: 1
page_size: 20

safety:
  lookahead_safe: false
  strict_mode: true
