fields:
  - standard_field: forward_adj_factor
    source_node: adj_factor_real
    source_field: factor_value
    field_role: adjustment_factor
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Interpreted as forward adjustment factor

  - standard_field: backward_adj_factor
    source_node: backward_factor_real
    source_field: factor_value
    field_role: adjustment_factor
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Interpreted as backward adjustment factor

  - standard_field: close_adj
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - close
      - forward_adj_factor
    formula: "{close} * {forward_adj_factor}"
    applies_to_grain: daily
    notes:
      - Derived adjusted close based on raw close and forward adjustment factor

  - standard_field: open_adj
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - open
      - forward_adj_factor
    formula: "{open} * {forward_adj_factor}"
    applies_to_grain: daily
    notes:
      - Derived adjusted open based on raw open and forward adjustment factor

  - standard_field: high_adj
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - high
      - forward_adj_factor
    formula: "{high} * {forward_adj_factor}"
    applies_to_grain: daily
    notes:
      - Derived adjusted high based on raw high and forward adjustment factor

  - standard_field: low_adj
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - low
      - forward_adj_factor
    formula: "{low} * {forward_adj_factor}"
    applies_to_grain: daily
    notes:
      - Derived adjusted low based on raw low and forward adjustment factor

  - standard_field: gap_open_return
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - open
      - pre_close
    formula: "({open} / nullIf({pre_close}, 0)) - 1"
    applies_to_grain: daily
    notes:
      - Derived gap open return based on raw open and previous close

  - standard_field: pre_close
    source_node: history_stock_status_real
    source_field: preclose
    field_role: status_snapshot_field
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Mapped from status snapshot table

  - standard_field: tot_share
    source_node: equity_structure_real
    source_field: tot_share
    field_role: equity_structure_field
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Mapped from equity structure table
      - Share unit is 10k shares

  - standard_field: float_share
    source_node: equity_structure_real
    source_field: float_share
    field_role: equity_structure_field
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Mapped from equity structure table
      - Share unit is 10k shares

  - standard_field: float_a_share
    source_node: equity_structure_real
    source_field: float_a_share
    field_role: equity_structure_field
    resolver_type: direct
    applies_to_grain: daily
    notes:
      - Mapped from equity structure table
      - Share unit is 10k shares

  - standard_field: turnover_rate
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - volume
      - float_share
    formula: "{volume} / nullIf(({float_share} * 10000), 0)"
    applies_to_grain: daily
    notes:
      - Derived daily turnover rate
      - float_share is in 10k-share units so denominator multiplies by 10000

  - standard_field: market_cap
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - close
      - tot_share
    formula: "{close} * ({tot_share} * 10000)"
    applies_to_grain: daily
    notes:
      - Derived market cap
      - tot_share is in 10k-share units so denominator multiplies by 10000

  - standard_field: float_market_cap
    source_node: null
    source_field: null
    field_role: derived_field
    resolver_type: derived
    depends_on:
      - close
      - float_share
    formula: "{close} * ({float_share} * 10000)"
    applies_to_grain: daily
    notes:
      - Derived float market cap
      - float_share is in 10k-share units so denominator multiplies by 10000

