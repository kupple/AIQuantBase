from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - dividend_progress
  - dividend_cash_pre_tax
  - ex_dividend_date
  - holder_total_num
  - share_holder_name
  - share_holder_pct

time_range:
  field: trade_time
  start: "2025-04-01 00:00:00"
  end: "2026-04-07 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "000004.SZ"
    - field: close
      op: is_not_null
      value: null

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
