from: stock_daily_real

select:
  - code
  - trade_time
  - close
  - kzz_call_begin_date
  - kzz_call_end_date
  - kzz_call_trigger_ratio
  - kzz_put_begin_date
  - kzz_put_end_date
  - kzz_put_trigger_ratio

time_range:
  field: trade_time
  start: "2025-05-01 00:00:00"
  end: "2025-05-31 23:59:59"

where:
  mode: and
  items:
    - field: code
      op: "="
      value: "123085.SZ"

order_by:
  - field: trade_time
    direction: asc

page: 1
page_size: 10

safety:
  lookahead_safe: true
  strict_mode: true
