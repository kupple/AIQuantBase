# AmazingData 000001.SZ 1 分钟 K 线重同步配置
#
# 用法：
#   PYTHONPATH=src python3 -m sync_data_system.run_sync --config config/sync/plans/run_sync.amazingdata.000001.minute.toml
#
# 说明：
# - 只重跑 000001.SZ 的 `minute_kline`
# - `force = true` 会绕过已同步记录，用于修补历史分钟线不完整的问题
# - 不写 end_date 时，程序会自动同步到最新交易日

source = "amazingdata"
log_level = "INFO"
continue_on_error = false

[defaults]
limit = 0
force = true

[[tasks]]
task = "minute_kline"
enabled = true
codes = "000001.SZ"
begin_date = 20100101
