# AmazingData 全量同步配置
#
# 用法：
#   python3 run_sync.py --config run_sync.amazingdata.full.toml
#
# 说明：
# - 这份配置把当前已接入的任务全部列出来了
# - 每个 [[tasks]] 前面都有中文注释，便于你按需启停
# - 不需要的任务，可以把 enabled 改成 true
# - 如果某个任务要只跑少量代码，可以填写 codes 或 limit
# - 对于本身不支持 begin_date / end_date 的任务，程序会自动忽略日期配置

source = "amazingdata"
log_level = "INFO"
continue_on_error = true

[defaults]
# 默认起始日期
begin_date = 20100101

# 默认结束日期
# 留空表示自动取最新交易日
# end_date = 20241231

# 默认不限制代码数量
limit = 0

# 默认不强制重跑
force = false

# 1. 同步代码池
[[tasks]]
task = "code_info"
enabled = true

# 2. 同步历史代码表
[[tasks]]
task = "hist_code_list"
enabled = true

# 3. 同步北交所新旧代码映射
[[tasks]]
task = "bj_code_mapping"
enabled = true

# 4. 同步股票基础信息
[[tasks]]
task = "stock_basic"
enabled = true

# 5. 同步历史证券状态
[[tasks]]
task = "history_stock_status"
enabled = true

# 5. 同步单次复权因子
[[tasks]]
task = "adj_factor"
enabled = false

# 6. 同步后复权因子
[[tasks]]
task = "backward_factor"
enabled = true

# 7. 同步资产负债表
[[tasks]]
task = "balance_sheet"
enabled = true

# 8. 同步现金流量表
[[tasks]]
task = "cash_flow"
enabled = true

# 9. 同步利润表
[[tasks]]
task = "income"
enabled = true

# 10. 同步业绩快报
[[tasks]]
task = "profit_express"
enabled = true

# 11. 同步业绩预告
[[tasks]]
task = "profit_notice"
enabled = true

# 12. 同步十大股东
[[tasks]]
task = "share_holder"
enabled = true

# 13. 同步股东户数
[[tasks]]
task = "holder_num"
enabled = true

# 14. 同步股本结构
[[tasks]]
task = "equity_structure"
enabled = true

# 15. 同步股权冻结 / 质押
[[tasks]]
task = "equity_pledge_freeze"
enabled = true

# 16. 同步限售股解禁
[[tasks]]
task = "equity_restricted"
enabled = true

# 17. 同步分红方案
[[tasks]]
task = "dividend"
enabled = true

# 18. 同步配股方案
[[tasks]]
task = "right_issue"
enabled = true

# 19. 同步指数成分股
# 这个任务不支持 begin_date / end_date，程序会自动忽略
[[tasks]]
task = "index_constituent"
enabled = true

# 20. 同步指数权重
[[tasks]]
task = "index_weight"
enabled = false
# 当前 AmazingData SDK 的 get_index_weight 在部分环境会内部报 KeyError('TRADE_DATE')
# 先默认关闭，待 SDK 侧问题确认后再打开

# 21. 同步行业基础信息
# 这个任务不需要代码池，也不支持 begin_date / end_date
[[tasks]]
task = "industry_base_info"
enabled = true

# 22. 同步行业成分股
# 默认自动从 ad_industry_base_info 中读取行业指数代码
[[tasks]]
task = "industry_constituent"
enabled = true

# 23. 同步行业权重
# 默认自动从 ad_industry_base_info 中读取行业指数代码
