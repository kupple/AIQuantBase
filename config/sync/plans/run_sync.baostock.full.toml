# BaoStock 全量同步配置
#
# 用法：
#   python3 run_sync.py --config run_sync.baostock.full.toml
#
# 说明：
# - 统一走 `run_sync.py` 入口，但 source 会切到 BaoStock
# - BaoStock 有每日 API 请求量限制，不建议同时开多个大批量任务
# - 如果是首次验证，建议先把 limit 调小，或者先只打开部分任务

source = "baostock"
log_level = "INFO"
continue_on_error = true
database = "baostock"

[defaults]
limit = 0
force = false
continue_on_error = true

# 1. 全市场证券列表
[[tasks]]
task = "all_stock"
enabled = true

# 2. 股票基础资料
[[tasks]]
task = "stock_basic"
enabled = true

# 3. 复权因子
[[tasks]]
task = "adjust_factor"
enabled = true
begin_date = 20100101

# 4. 日线 K 线
[[tasks]]
task = "daily_kline"
enabled = true
begin_date = 20100101

# 5. 行业分类
[[tasks]]
task = "stock_industry"
enabled = true

# 6. 沪深 300 成分
[[tasks]]
task = "hs300_stocks"
enabled = true

# 7. 上证 50 成分
[[tasks]]
task = "sz50_stocks"
enabled = true

# 8. 中证 500 成分
[[tasks]]
task = "zz500_stocks"
enabled = true

# 9. 交易日历
[[tasks]]
task = "trade_dates"
enabled = true
begin_date = 20100101

# 10. 存款利率
[[tasks]]
task = "deposit_rate_data"
enabled = true
begin_date = 20100101

# 11. 贷款利率
[[tasks]]
task = "loan_rate_data"
enabled = true
begin_date = 20100101

# 12. 存款准备金率
[[tasks]]
task = "required_reserve_ratio_data"
enabled = true
begin_date = 20100101

# 13. 月度货币供应量
[[tasks]]
task = "money_supply_data_month"
enabled = true
begin_date = 201001

# 14. 年度货币供应量
[[tasks]]
task = "money_supply_data_year"
enabled = true
begin_date = 2010

# 15. 分红数据
[[tasks]]
task = "dividend_data"
enabled = false
year = 2024
year_type = "report"

# 16. 利润能力
[[tasks]]
task = "profit_data"
enabled = false
year = 2024
quarter = 4

# 17. 营运能力
[[tasks]]
task = "operation_data"
enabled = false
year = 2024
quarter = 4

# 18. 成长能力
[[tasks]]
task = "growth_data"
enabled = false
year = 2024
quarter = 4

# 19. 杜邦分析
[[tasks]]
task = "dupont_data"
enabled = false
year = 2024
quarter = 4

# 20. 偿债能力
[[tasks]]
task = "balance_data"
enabled = false
year = 2024
quarter = 4

# 21. 现金流能力
[[tasks]]
task = "cash_flow_data"
enabled = false
year = 2024
quarter = 4

# 22. 业绩快报
[[tasks]]
task = "performance_express_report"
enabled = false
begin_date = 20100101

# 23. 业绩预告
[[tasks]]
task = "forecast_report"
enabled = false
begin_date = 20100101
