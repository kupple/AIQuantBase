  preview_sql: "SELECT\n  b0.code AS code,\n  b0.trade_time AS trade_time,\n  b0.open\
    \ AS open,\n  b0.high AS high,\n  b0.low AS low,\n  b0.close AS close,\n  t1.preclose\
    \ AS pre_close,\n  b0.volume AS volume,\n  b0.amount AS amount,\n  (b0.open *\
    \ t2.factor_value) AS open_adj,\n  (b0.high * t2.factor_value) AS high_adj,\n\
    \  (b0.low * t2.factor_value) AS low_adj,\n  (b0.close * t2.factor_value) AS close_adj,\n\
    \  t1.is_st_sec AS is_st,\n  t3.is_susp_sec AS is_suspended,\n  t3.is_wd_sec AS\
    \ is_wd_sec,\n  t3.is_xr_sec AS is_xr_sec,\n  (startsWith(b0.code, '688')) AS\
    \ is_kcb,\n  (startsWith(b0.code, '30')) AS is_cyb,\n  (endsWith(b0.code, '.BJ'))\
    \ AS is_bjs,\n  t3.high_limited AS high_limited,\n  t3.low_limited AS low_limited,\n\
    \  t2.factor_value AS backward_adj_factor,\n  (b0.close * (t4.tot_share * 10000))\
    \ AS market_cap,\n  (b0.close * (t4.float_share * 10000)) AS float_market_cap,\n\
    \  (b0.volume / nullIf((t4.float_share * 10000), 0)) AS turnover_rate\nFROM starlight.ad_market_kline_daily\
    \ b0\nANY LEFT JOIN starlight.ad_history_stock_status t1 ON b0.code = t1.market_code\
    \ AND toDate(b0.trade_time) = t1.trade_date\nANY LEFT JOIN starlight.ad_backward_factor\
    \ t2 ON b0.code = t2.code AND toDate(b0.trade_time) = t2.trade_date\nLEFT JOIN\
    \ starlight.ad_history_stock_status t3 ON b0.code = t3.market_code AND toDate(b0.trade_time)\
    \ = t3.trade_date\nASOF LEFT JOIN starlight.ad_equity_structure t4 ON b0.code\
    \ = t4.market_code AND toDate(b0.trade_time) >= t4.change_date"
