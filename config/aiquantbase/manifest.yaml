version: 1
provider: aiquantbase
capability_registry:
  valuation_snapshot:
    name: 估值快照
    description: 用于读取总市值、流通市值、换手率等日频估值字段
    output_scope:
      scope_type: daily_panel
      entity_type: stock
      keys:
        entity: code
        time: trade_time
  custom_factor_daily:
    name: 自定义日频因子
    description: 用于接入用户自定义日频因子，供排序、过滤、风控或输出使用
    output_scope:
      scope_type: daily_panel
      entity_type: stock
      keys:
        entity: code
        time: trade_time
    enabled: false
  industry_classification:
    name: 行业分类
    description: 用于接入行业、主题、板块等日频归属字段，供过滤、分组或中性化使用
    output_scope:
      scope_type: linked_daily_panel
      base_entity_type: stock
      linked_entity_type: industry
      output_entity_type: stock
      keys:
        entity: code
        time: trade_time
  stock_pool_membership:
    name: 股票池成分
    description: 用于接入指数、板块、主题或自定义股票池成分归属字段，供候选池过滤和报告使用
    output_scope:
      scope_type: daily_panel
      entity_type: stock
      keys:
        entity: code
        time: trade_time
  dragon_tiger_daily:
    name: 龙虎榜日频
    description: 用于接入龙虎榜事件字段，供过滤、排序或输出使用
    output_scope:
      scope_type: daily_panel
      entity_type: stock
      keys:
        entity: market_code
        time: trade_date
    enabled: true
  price.daily:
    name: 日线行情
    description: A 股/指数/ETF 日线行情与基础状态宽表
    output_scope:
      scope_type: daily_panel
      entity_type: stock
      keys:
        entity: code
        time: trade_time
query_profiles:
  panel_time_series:
    description: symbols + start/end + fields 的时间序列面板查询
  interval_membership:
    description: 成分/归属区间查询，按实体字段、生效日期和失效日期返回关系区间
  event_stream:
    description: symbols + date range 的事件流查询
  anchored_intraday_window:
    description: 基于交易锚点和分钟时间列表的盘中执行窗口查询
  virtual_runtime_rule:
    description: 不查表，由回测运行时直接提供的市场规则能力
nodes:
  stock_daily_real:
    description: A 股/指数/ETF 日线行情与基础状态宽表
    asset_types:
    - stock
    - index
    - etf
    query_profiles:
    - panel_time_series
    keys:
      symbol: code
      time: trade_time
    semantics:
      price.daily:
        fields:
          open: open
          high: high
          low: low
          close: close
          pre_close: pre_close
          volume: volume
          amount: amount
          backward_adj_factor: backward_adj_factor
          close_adj: close_adj
        description: A 股/指数/ETF 日线行情与基础状态宽表
      benchmark.daily:
        fields:
          open: open
          close: close
      tradability.limit_status:
        fields:
          high_limited: high_limited
          low_limited: low_limited
      universe.tradeable_flags:
        fields:
          is_st: is_st
          is_suspended: is_suspended
          is_wd_sec: is_wd_sec
          listed_days:
            derive: trade_date - list_date
            depends_on:
            - list_date
      universe.board_flags:
        fields:
          is_kcb: is_kcb
          is_cyb: is_cyb
          is_bjs: is_bjs
          is_star_board: is_kcb
          is_gem_board: is_cyb
      valuation_snapshot:
        fields:
          market_cap: market_cap
          float_market_cap: float_market_cap
          turnover_rate: turnover_rate
        description: 用于读取总市值、流通市值、换手率等日频估值字段
  index_constituent_real:
    description: 指数、板块、主题或自定义股票池成分关系表
    asset_types:
    - stock
    query_profiles:
    - interval_membership
    keys:
      symbol: con_code
      start: in_date
      end: out_date
    semantics:
      stock_pool_membership:
        description: 指数、板块、主题或自定义股票池成分归属字段
        fields:
          index_constituent_code: index_code
          index_constituent_name: index_name
          index_name: index_name
  stock_minute_real:
    description: A 股/ETF 分钟行情表
    asset_types:
    - stock
    - etf
    query_profiles:
    - anchored_intraday_window
    keys:
      symbol: code
      datetime: trade_time
    semantics:
      price.intraday:
        fields:
          open: open
          high: high
          low: low
          close: close
          volume: volume
          amount: amount
          money: amount
  stock_industry_daily_real:
    description: 行业日线行情节点表
    asset_types:
    - stock
    query_profiles:
    - panel_time_series
    keys:
      symbol: index_code
      time: trade_date
    semantics:
      industry_classification:
        description: 行业日线主表字段，行业名称和行业代码通过行业基础信息表关联取得
        fields:
          industry_index_code: index_code
          industry_index_name: industry_index_name
          industry_code: industry_code
          industry_level1_name: industry_level1_name
          industry_level2_name: industry_level2_name
          industry_level3_name: industry_level3_name
          industry_name: industry_name
  dividend_real:
    description: 股票现金分红、送股和转增事件表
    asset_types:
    - stock
    query_profiles:
    - event_stream
    keys:
      symbol: market_code
      event_time: date_ex
      payout_time: date_dvd_payout
      publish_time: ann_date
    filters:
      finalized:
        field: div_progress
        value: '3'
    semantics:
      corporate_action.dividend:
        fields:
          dividend_cash_pre_tax: dvd_per_share_pre_tax_cash
          dividend_cash_after_tax: dvd_per_share_after_tax_cash
          dividend_stock_per_share: dvd_per_share_stk
          dividend_bonus_rate: div_bonusrate
          dividend_conversed_rate: div_conversedrate
          ex_dividend_date: date_ex
          dividend_payout_date: date_dvd_payout
          equity_record_date: date_eqy_record
  cn_stock_order_rules:
    description: A 股订单运行时规则，不对应物理查询节点
    asset_types:
    - stock
    query_profiles:
    - virtual_runtime_rule
    keys: {}
    semantics:
      order_constraints.cn_stock:
        fields:
          lot_size: 100
          supports_min_commission: true
          supports_order_volume_ratio: true
  long_hu_bang_real:
    description: long_hu_bang_real provider node
    asset_types:
    - stock
    query_profiles:
    - panel_time_series
    keys:
      symbol: market_code
      time: trade_date
    semantics:
      dragon_tiger_daily:
        description: 用于接入龙虎榜事件字段，供过滤、排序或输出使用
        fields:
          market_code: market_code
          trade_date: trade_date
          security_name: security_name
          reason_type: reason_type
          reason_type_name: reason_type_name
          change_range: change_range
          trader_name: trader_name
          buy_amount: buy_amount
          sell_amount: sell_amount
          flow_mark: flow_mark
          total_amount: total_amount
          total_volume: total_volume
