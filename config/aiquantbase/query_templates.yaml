version: 1

query_templates:
  stock_daily_panel:
    capability: price.daily
    query_profile: panel_time_series
    description: 股票日线面板查询
    params_template:
      asset_type: stock
      freq: 1d
      symbols: []
      universe: null
      fields: []
      start: null
      end: null

  benchmark_daily_series:
    capability: benchmark.daily
    query_profile: panel_time_series
    description: 基准日线序列查询
    params_template:
      asset_type: stock
      freq: 1d
      symbols: []
      fields:
        - close
      start: null
      end: null

  stock_intraday_execution:
    capability: price.intraday
    query_profile: anchored_intraday_window
    description: 股票分钟执行窗口查询
    params_template:
      asset_type: stock
      symbols: []
      trading_days: []
      start_hhmm: null
      end_hhmm: null
      hhmm_list: []
      fields: []

  stock_dividend_events:
    capability: corporate_action.dividend
    query_profile: event_stream
    description: 股票分红事件查询
    params_template:
      symbols: []
      start: null
      end: null
      finalized_only: true
