version: 1
mode_kind: research_modes
mode_name: factor_research
description: 因子研究模式

aiquantbase:
  required_capabilities:
    - capability: price.daily
  optional_capabilities:
    - capability: benchmark.daily
    - capability: universe.board_flags
    - capability: universe.tradeable_flags
    - capability: valuation_snapshot
  extension_slots:
    - slot: factor_inputs
      name: 因子输入
      description: 用于因子计算和分析的输入字段
      query_profile: panel_time_series
      freq: 1d
    - slot: filter_fields
      name: 过滤字段
      description: 用于研究样本过滤
      query_profile: panel_time_series
      freq: 1d
    - slot: groupby_fields
      name: 分组字段
      description: 用于行业、主题等分组分析
      query_profile: panel_time_series
      freq: 1d
    - slot: neutralization_fields
      name: 中性化字段
      description: 用于因子中性化处理
      query_profile: panel_time_series
      freq: 1d
    - slot: report_fields
      name: 报告字段
      description: 仅用于研究结果展示
      query_profile: panel_time_series
      freq: 1d
  extension_capability_bindings: []

query_needs:
  - id: daily_market
    use: stock_daily_panel
    required: true
    derive:
      universe_from: scope.universe
      symbols_from: scope.symbols
      start_from: scope.start
      end_from: scope.end
      fields_from:
        - data_requirement.fields
  - id: benchmark_daily
    use: benchmark_daily_series
    required: false
    derive:
      symbol_from: scope.benchmark
      start_from: scope.start
      end_from: scope.end
      fields_default:
        - close
