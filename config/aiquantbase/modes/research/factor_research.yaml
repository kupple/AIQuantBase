version: 1
mode_kind: research_modes
mode_name: factor_research
description: 日频因子研究模式
aiquantbase:
  accepted_output_scopes:
  - scope_type: daily_panel
    entity_type: stock
  - scope_type: linked_daily_panel
    output_entity_type: stock
  required_capabilities:
  - capability: price.daily
    fields:
    - close_adj
    provider_node: stock_daily_real
    field_map:
      open: open
      high: high
      low: low
      close: close
      pre_close: pre_close
      volume: volume
      amount: amount
      dollar_volume: amount
      backward_adj_factor: backward_adj_factor
      close_adj: close_adj
      high_limited: high_limited
      low_limited: low_limited
      is_st: is_st
      is_suspended: is_suspended
      is_wd_sec: is_wd_sec
      listed_days:
        derive: trade_date - list_date
        depends_on:
        - list_date
      is_kcb: is_kcb
      is_cyb: is_cyb
      is_bjs: is_bjs
  conditional_capabilities:
  - capability: benchmark.daily
    fields:
    - close
    provider_node: stock_daily_real
    field_map:
      close: close
  - capability: universe.board_flags
    fields:
    - is_kcb
    - is_cyb
    - is_bjs
    provider_node: stock_daily_real
    field_map:
      is_kcb: is_kcb
      is_cyb: is_cyb
      is_bjs: is_bjs
  - capability: universe.tradeable_flags
    fields:
    - is_st
    - is_suspended
    - is_wd_sec
    - listed_days
    provider_node: stock_daily_real
    field_map:
      is_st: is_st
      is_suspended: is_suspended
      is_wd_sec: is_wd_sec
      listed_days:
        derive: trade_date - list_date
        depends_on:
        - list_date
  - capability: tradability.limit_status
    fields:
    - high_limited
    - low_limited
    provider_node: stock_daily_real
    field_map:
      high_limited: high_limited
      low_limited: low_limited
query_needs:
- id: daily_market
  use: stock_daily_panel
  required: true
  derive:
    universe_from: scope.universe
    symbols_from: scope.symbols
    start_from: scope.start
    end_from: scope.end
    fields_from:
    - data_requirement.fields
    fields_append:
    - close_adj
- id: benchmark_daily
  use: benchmark_daily_series
  required: false
  derive:
    symbol_from: scope.benchmark
    start_from: scope.start
    end_from: scope.end
    fields_default:
    - close
